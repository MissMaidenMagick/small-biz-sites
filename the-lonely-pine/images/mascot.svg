  <path d="M222 176 l16 -6" stroke="#241d15" stroke-width="6" stroke-linecap="round"/>
  <rect x="106" y="176" width="16" height="10" rx="3" fill="#faf3e4" opacity="0.5"/>
  <rect x="172" y="176" width="16" height="10" rx="3" fill="#faf3e4" opacity="0.5"/>

